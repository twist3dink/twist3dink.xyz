<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAY LESS — Drop #1</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: #eee;
      padding: 2rem;
      text-align: center;
      max-width: 700px;
      margin: auto;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #f05;
    }
    .quote-box {
      margin: 2rem 0;
      padding: 1.5rem;
      background: #1a1a1a;
      border-left: 4px solid #f05;
      font-size: 1.2rem;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(255, 0, 85, 0.2);
    }
    button {
      background: #f05;
      border: none;
      color: #fff;
      padding: 0.7rem 1.5rem;
      margin: 0.5rem;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover:not(:disabled) {
      background: #c0044a;
    }
    button:disabled {
      background: #444;
      color: #aaa;
      cursor: not-allowed;
    }
    #confessionalToggle {
      margin-top: 1rem;
      background: #444;
      color: #eee;
      padding: 0.5rem 1rem;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }
    #confessionalToggle:hover {
      background: #666;
    }
    #confessional {
      margin-top: 1rem;
      background: #222;
      padding: 1rem;
      border-left: 4px solid #f05;
      text-align: left;
      font-style: italic;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, padding 0.4s ease;
    }
    #confessional.open {
      max-height: 300px;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <h1>SAY LESS — Digital Drop #1</h1>

  <div id="quote" class="quote-box">Loading...</div>

  <div>
    <button id="prevBtn" disabled>Prev</button>
    <button id="nextBtn">Next</button>
  </div>

  <div>
    <div id="confessionalToggle">Reveal Confessional</div>
    <div id="confessional"></div>
  </div>

  <script>
    const quotes = [
      "Some scars don’t heal — they just learn how to speak without bleeding.",
      "When you’ve thought of every problem that matched every stage of your life, the only thing left to think of are solutions. And so the same tools can also be used as weapons.",
      "I don’t write because I want to be read. I write because I never learned how to scream.",
      "This isn’t a quote. It’s a trigger."
    ];

    const confessionals = [
      "Every scar on my body is a sentence I didn’t have the words for.",
      "The same survival tactics that saved me nearly destroyed me.",
      "Ink became my language when my voice went numb.",
      "Sometimes I want them to flinch the way I had to freeze."
    ];

    const quoteDiv = document.getElementById('quote');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const confessionalToggle = document.getElementById('confessionalToggle');
    const confessionalDiv = document.getElementById('confessional');

    let currentIndex = 0;
    let confessionalOpen = false;

    function updateQuote() {
      quoteDiv.textContent = quotes[currentIndex];
      confessionalDiv.textContent = confessionals[currentIndex];
      confessionalDiv.classList.remove('open');
      confessionalToggle.textContent = 'Reveal Confessional';
      confessionalOpen = false;
      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === quotes.length - 1;
    }

    prevBtn.addEventListener('click', () => {
      if (currentIndex > 0) {
        currentIndex--;
        updateQuote();
      }
    });

    nextBtn.addEventListener('click', () => {
      if (currentIndex < quotes.length - 1) {
        currentIndex++;
        updateQuote();
      }
    });

    confessionalToggle.addEventListener('click', () => {
      confessionalOpen = !confessionalOpen;
      if (confessionalOpen) {
        confessionalDiv.classList.add('open');
        confessionalToggle.textContent = 'Hide Confessional';
      } else {
        confessionalDiv.classList.remove('open');
        confessionalToggle.textContent = 'Reveal Confessional';
      }
    });

    updateQuote();
  </script>
</body>
</html>
